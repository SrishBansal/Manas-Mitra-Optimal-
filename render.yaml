services:
  - type: web
    name: manas-mitra-backend
    env: python
    buildCommand: pip install -r requirements.txt && python backend/scripts/seed_database.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GEMINI_API_KEY
        sync: false
      - key: HF_HUB_OFFLINE
        value: "1"
      - key: TRANSFORMERS_OFFLINE
        value: "1"
